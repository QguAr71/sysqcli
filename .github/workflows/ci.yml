name: CI — Syntax Check

on:
  push:
    paths:
      - '**.zsh'
  pull_request:
    paths:
      - '**.zsh'

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ZSH
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Syntax check all .zsh files
        run: |
          echo "=== Checking all .zsh files ==="
          FAIL=0
          for f in *.zsh; do
            zsh -n "$f" 2>&1 && echo "  ✅ $f" || { echo "  ❌ $f"; FAIL=1; }
          done
          exit $FAIL
